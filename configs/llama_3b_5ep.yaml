# ──────────────────────────────────────────────
# Llama-3.2-3B-Instruct — 5 epoch SFT (capacity test)
# ──────────────────────────────────────────────
# Tests whether more epochs help 3B models absorb domain knowledge.
# If factuality stays at 7.8% after 5 epochs, the capacity hypothesis
# is confirmed: 3B models lack parameters to encode domain facts.
#
# Usage:
#   python scripts/run_sft.py --config configs/llama_3b_5ep.yaml
#   python scripts/eval_factuality_all.py \
#       --base-model meta-llama/Llama-3.2-3B-Instruct \
#       --sft-adapter ./outputs/llama_3b_5ep/sft/final_adapter \
#       --dpo-adapter ./outputs/llama_3b/dpo/dpo_adapter \
#       --eval-file data/eval_factuality.jsonl

model:
  model_id: "meta-llama/Llama-3.2-3B-Instruct"
  family: "llama-3.2"
  max_seq_length: 512
  trust_remote_code: false
  quantization:
    mode: "int4_nf4"
    quant_type: "nf4"
    use_double_quant: true
    compute_dtype: "bfloat16"
  lora:
    rank: 16
    alpha: 32
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
    dropout: 0.05

sft:
  learning_rate: 0.0002
  batch_size: 4
  gradient_accumulation_steps: 4
  num_epochs: 5                   # 5 epochs — capacity test
  warmup_steps: 50
  bf16: true
  gradient_checkpointing: true
  logging_steps: 5
  save_steps: 200
  eval_steps: 200
  output_dir: "./outputs/llama_3b_5ep/sft"

dpo:
  beta: 0.05
  learning_rate: 0.00001
  batch_size: 2
  gradient_accumulation_steps: 4
  num_epochs: 1
  bf16: true
  gradient_checkpointing: true
  logging_steps: 20
  save_steps: 200
  eval_steps: 100
  output_dir: "./outputs/llama_3b_5ep/dpo"
