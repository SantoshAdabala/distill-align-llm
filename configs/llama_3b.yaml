# ──────────────────────────────────────────────
# Llama-3.2-3B-Instruct — Scale sensitivity experiment
# ──────────────────────────────────────────────
# Tests whether smaller models have larger or smaller AFG.
# Same hyperparameters as 8B to isolate scale effects.
# Faster to train (~$8 on RunPod, ~30 min total).
#
# Usage:
#   python scripts/run_sft.py --config configs/llama_3b.yaml
#   python scripts/run_dpo.py --config configs/llama_3b.yaml \
#       --sft-adapter ./outputs/llama_3b/sft/final_adapter --merge-sft

model:
  model_id: "meta-llama/Llama-3.2-3B-Instruct"
  family: "llama-3.2"
  max_seq_length: 512
  trust_remote_code: false
  quantization:
    mode: "int4_nf4"
    quant_type: "nf4"
    use_double_quant: true
    compute_dtype: "bfloat16"
  lora:
    rank: 16
    alpha: 32
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
    dropout: 0.05

sft:
  learning_rate: 0.0002
  batch_size: 4                   # Larger batch — 3B fits easily
  gradient_accumulation_steps: 4  # Effective batch = 4 × 4 = 16
  num_epochs: 3
  warmup_steps: 50
  bf16: true
  gradient_checkpointing: true
  logging_steps: 5
  save_steps: 200
  eval_steps: 200
  output_dir: "./outputs/llama_3b/sft"

dpo:
  beta: 0.05
  learning_rate: 0.00001
  batch_size: 2                   # Can fit larger batch with 3B
  gradient_accumulation_steps: 4
  num_epochs: 1
  bf16: true
  gradient_checkpointing: true
  logging_steps: 20
  save_steps: 200
  eval_steps: 100
  output_dir: "./outputs/llama_3b/dpo"
